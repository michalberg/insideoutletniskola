params:
  themes:
    event:
      title: "Inside out: Pedagogies for Inner and Systemic Change"
      heroSubtitle: "Summer school, 16–20 August 2026, Czechia, Předklášteří"
      shortTitle: LOGO
      startDate: 2026-08-15
      endDate: 2026-08-19
      location: Czechia, Předklášteří
      address:
        - Porta Coeli 1001
        - 666 02 Předklášteří
        - Czechia

      slogan: "Education for a future where society<br>and nature flourish side by side"
      description: |
        - **Do you seek to foster deeper impact and inner transformation in your students?**
        - **Would you like to strengthen your methodological skills and pedagogical confidence to guide participants through times of polycrisis?**
        - **Are you looking to connect with like-minded educators and cultivate hope within yourself?**
        - **Do you want to learn in a beautiful venue that embodies the values of the world we would like to create?**

        Education is a key instrument of profound social change. **Inside out: Pedagogies for Inner and Systemic Change summer school** acknowledges the role of education in transformation and intentionally builds upon it. The summer school supports educators who have been seeking meaningful ways to contribute to systemic transformation through their educational practice. By creating a space for reflection, experimentation, and shared learning, the program strengthens participants' capacity to engage in both inner and societal change through education.

      directions: |
        At NaZemi, we have long desired a space that we could use to hold our seminars, a space where we could host other groups and at the same time model and live our values. Now we have found it. We are delighted to be working to create a place for organizations and teams to meet, relax, and work. A place for school classes, courses, and seminars to stay and learn. It is called **NaNebi** and is located on the premises of the **[Porta Coeli monastery](https://en.wikipedia.org/wiki/Porta_coeli_Convent)** in Předklášteří, just a few train stops from Brno.

        **NaNebi offers:**
        - Accommodation, including all necessary facilities
        - Conference rooms
        - Kitchens and dining rooms
        - Gardens and other outdoor areas
        - Meals throughout your stay

        We approach the monastery setting with respect for its unique character and in harmony with our values: we strive for a future beyond economic growth, reconciliation across society, and a way of life that respects planetary boundaries. In doing so, we seek to build on the Cistercian tradition of humility and moderation in our relationships with people and the world. We are therefore happy to welcome groups who share this vision and who are already contributing to or wish to contribute to the creation of a similar environment through their own activities.

        At the monastery and in its surroundings, we co-create and support a range of smaller projects, from making cider from local apples, to producing biochar, a community garden, an eco-friendly flower shop, organic farming, and the Tišnov zero-waste store. By arrangement, we offer groups a tour of both the monastery's historical monuments and these individual projects.

      aboutUs: |
        **Inside Out Pedagogies** is a community of educators committed to
        transforming learning from the inside out — starting with relationships,
        curiosity, and trust. Our annual summer school brings together
        practitioners from across Central and Eastern Europe to share
        experience, deepen practice, and build lasting connections.

        [Learn more about our manifesto →](/manifesto/)

